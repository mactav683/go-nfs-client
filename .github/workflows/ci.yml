# Continuous integration for go-nfs-client.
#
# Uses Go's built-in tooling only (go build / go vet / gofmt / go test
# -coverprofile / go tool cover). Three jobs:
#   - lint:        gofmt + go vet (unit and integration build tags)
#   - test:        unit tests with coverage, across supported Go versions
#   - integration: full //go:build integration suite against a Dockerized
#                  NFS-Ganesha server (v4.0, v4.1, and auto-negotiation)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

jobs:
  lint:
    name: Lint (gofmt + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l nfs4 client rpc xdr)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet (default + integration build tags)
        run: |
          go vet ./...
          go vet -tags integration ./...

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with the `go` directive in go.mod. Add newer versions
        # here as they are adopted.
        go: ["1.24"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Test with coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')"
          echo "Total coverage: ${total}"
          {
            echo "## Coverage (Go ${{ matrix.go }})"
            echo ""
            echo "**Total: ${total}**"
            echo ""
            echo '<details><summary>Per-function</summary>'
            echo ""
            echo '```'
            cat coverage.txt
            echo '```'
            echo ""
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate HTML coverage report
        if: matrix.go == '1.24'
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifacts
        if: matrix.go == '1.24'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt
            coverage.html
          if-no-files-found: error

  integration:
    name: Integration (Dockerized NFSv4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minorversion: ["", "1", "auto"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Build integration tests
        run: go build -tags integration ./...

      - name: Bring up NFS-Ganesha
        run: docker compose -f integration/docker-compose.yml up -d --build --wait

      - name: Seed pre-existing file
        run: |
          docker exec \
            -e SEED_NAME=preexisting.txt \
            -e SEED_CONTENT="hello from the server before the client connected" \
            go-nfs-client-ganesha \
            sh -c 'printf "%s" "$SEED_CONTENT" > "/export/$SEED_NAME"'

      - name: Run integration suite
        env:
          NFS_SERVER_ADDR: 127.0.0.1:2049
          NFS_EXPORT: /
          NFS_MINORVERSION: ${{ matrix.minorversion }}
          NFS_EXISTING_FILE: preexisting.txt
          NFS_EXISTING_CONTENT: "hello from the server before the client connected"
        run: go test -tags integration -timeout 300s ./...

      - name: Dump server logs on failure
        if: failure()
        run: docker logs go-nfs-client-ganesha || true

      - name: Tear down
        if: always()
        run: docker compose -f integration/docker-compose.yml down -v || true
