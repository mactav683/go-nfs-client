# Release workflow for go-nfs-client.
#
# Triggered by pushing a semver tag (e.g. v0.1.0). It runs the full quality
# gate using Go's built-in tooling, then publishes a GitHub Release with
# auto-generated notes. As a Go library, the "artifact" is the tagged module
# itself (consumers `go get` it); no binaries are built.
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  GO_VERSION: "1.24"

jobs:
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Environment
        run: |
          echo "::group::go version"; go version; echo "::endgroup::"
          echo "::group::go env";     go env;     echo "::endgroup::"

      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l nfs4 client rpc xdr)"
          if [ -n "$unformatted" ]; then
            echo "::error::Not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
          echo "All files are gofmt-clean."

      - name: Vet (verbose, both build tags)
        run: |
          go vet -v ./...
          go vet -v -tags integration ./...

      - name: Build (verbose, both build tags)
        run: |
          go build -v ./...
          go build -v -tags integration ./...

      - name: Test (verbose, race, coverage)
        run: go test -v -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage report (per-function + total)
        run: |
          echo "::group::go tool cover -func"
          go tool cover -func=coverage.out | tee coverage.txt
          echo "::endgroup::"
          go tool cover -func=coverage.out >> "$GITHUB_STEP_SUMMARY"

  integration:
    name: Integration gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Bring up NFS-Ganesha
        run: docker compose -f integration/docker-compose.yml up -d --build --wait

      - name: Server status
        run: |
          echo "::group::container ps"; docker ps --filter name=go-nfs-client-ganesha; echo "::endgroup::"
          echo "::group::ganesha startup log"; docker logs go-nfs-client-ganesha; echo "::endgroup::"

      - name: Seed pre-existing file
        run: |
          docker exec \
            -e SEED_NAME=preexisting.txt \
            -e SEED_CONTENT="hello from the server before the client connected" \
            go-nfs-client-ganesha \
            sh -c 'printf "%s" "$SEED_CONTENT" > "/export/$SEED_NAME"'
          echo "::group::export contents"; docker exec go-nfs-client-ganesha ls -l /export; echo "::endgroup::"

      - name: Run integration suite (verbose)
        env:
          NFS_SERVER_ADDR: 127.0.0.1:2049
          NFS_EXPORT: /
          NFS_EXISTING_FILE: preexisting.txt
          NFS_EXISTING_CONTENT: "hello from the server before the client connected"
        run: go test -v -tags integration -timeout 300s ./...

      - name: Ganesha log (post-run)
        if: always()
        run: |
          echo "::group::ganesha log (post-run)"; docker logs go-nfs-client-ganesha || true; echo "::endgroup::"

      - name: Tear down
        if: always()
        run: docker compose -f integration/docker-compose.yml down -v || true

  publish:
    name: Publish GitHub Release
    needs: [gate, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # Mark pre-1.0 tags as prereleases.
          PRERELEASE=""
          case "$TAG" in
            v0.*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE
