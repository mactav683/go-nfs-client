# NFS-Ganesha configuration for the go-nfs-client integration harness.
#
# Userspace NFSv4 server (FSAL_VFS) exporting /export over TCP/2049. The
# go-nfs-client is a pure-userspace TCP client, so no kernel mount is involved
# on either side — this config only needs to make the export reachable over
# NFSv4 with AUTH_SYS.

NFS_Core_Param {
	# NFSv4 only; disable the older protocols and the MOUNT/NLM side-band
	# services we do not exercise. TCP only.
	Protocols = 4;
	# Listen on the standard NFS port inside the container.
	NFS_Port = 2049;
	# Do not require the rpcbind/portmapper round trip.
	Enable_NLM = false;
	Enable_RQUOTA = false;
}

NFSV4 {
	# Short grace/lease so server restarts (and our lease tests) move quickly.
	Lease_Lifetime = 20;
	Grace_Period = 20;
	# Allow v4.0 clients in addition to v4.1 (minor version 0 and 1).
	Minor_Versions = 0, 1;
}

EXPORT {
	Export_Id = 1;
	Path = /export;
	# Mount the export AT the NFSv4 pseudo-root so a client that opens paths
	# relative to the mount root (e.g. RWFS.OpenFile("foo.bin")) lands inside
	# this RW export rather than the read-only synthetic pseudo-fs root.
	Pseudo = /;
	Access_Type = RW;
	# Do not remap the incoming AUTH_SYS uid/gid; the integration tests
	# authenticate as root (uid 0), which owns the 0777 /export directory.
	Squash = No_Root_Squash;
	SecType = sys;
	# Belt-and-suspenders: if any identity is squashed, map it to root so it can
	# still write the world-writable export. This keeps the throwaway test
	# server permissive regardless of the client uid.
	Anonymous_Uid = 0;
	Anonymous_Gid = 0;
	# Allow connections from anywhere (the container is only reachable from the
	# host in the integration harness).
	Clients = *;
	FSAL {
		Name = VFS;
	}
}

LOG {
	Default_Log_Level = EVENT;
}
